<html>

<head>

    the `--base-href` argument provided to `flutter build`.

  <!-- Google Site Verification -->
  <meta name="google-site-verification" content="vsMMoUl4hCyDBfwNCf0GvUoymA5BksM7WvalXYTiwso" />

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MaaCare – Pregnancy & Motherhood Support App">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="maacare">
  <link rel="apple-touch-icon" href="icons/WhatsApp%20Image%202026-04-11%20at%2010.29.41%20AM.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/WhatsApp%20Image%202026-04-11%20at%2010.29.41%20AM.png" />

  <title>MaaCare – You are never alone, Mama 💕</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Prevent white flash before Flutter loads */
    body {
      margin: 0;
      background-color: #0F0F1A;
    }

    /* Native splash shown while Flutter engine boots */
    #flutter-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0F0F1A 0%, #1A1A2E 100%);
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #flutter-loading .logo-ring {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid rgba(255, 105, 180, 0.6);
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(255, 105, 180, 0.4),
        0 0 80px rgba(157, 78, 221, 0.2);
      animation: pulse 1.4s ease-in-out infinite;
    }

    #flutter-loading .logo-ring span {
      font-size: 48px;
    }

    #flutter-loading p {
      margin-top: 28px;
      color: rgba(255, 255, 255, 0.5);
      font-family: sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(0.96);
        box-shadow: 0 0 30px rgba(255, 105, 180, 0.3);
      }

      50% {
        transform: scale(1.04);
        box-shadow: 0 0 55px rgba(255, 105, 180, 0.6);
      }
    }
  </style>
</head>

<body>

  <!-- Native loading UI shown before Flutter engine is ready -->
  <div id="flutter-loading">
    <div class="logo-ring"><span>💕</span></div>
    <p>Loading MaaCare…</p>
  </div>

  <script src="flutter_bootstrap.js?v=1.0.1" async></script>
  <script>
    function displayErrorVisual(message) {
      console.error('Visual Error Caught:', message);
      var loaderText = document.querySelector('#flutter-loading p');
      if (loaderText) {
        loaderText.innerHTML = '<span style="color:red;font-weight:bold;">ERROR:</span> ' + message;
        loaderText.style.color = '#ffaa22';
      }
    }

    window.addEventListener('error', function (e) {
      displayErrorVisual(e.message || String(e));
    });

    window.addEventListener('unhandledrejection', function (event) {
      displayErrorVisual(event.reason || 'Promise Rejection');
    });

    // Bootstrapping fallback for older flutter or debugging
    window.addEventListener('load', function (ev) {
      if (typeof _flutter === 'undefined') {
        console.warn("flutter_bootstrap.js is handling it, or flutter.js is missing.");
      }
    });

    // Hide the native loader once Flutter signals it is ready
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('flutter-loading');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(function () { loader.remove(); }, 400);
      }
    });
  </script>

  <!-- Razorpay Checkout -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    // Bridge function called from Flutter via dart:js
    function openRazorpay(keyId, amount, currency, name, description, email, phone, orderId) {
      var options = {
        key: keyId,
        amount: amount,
        currency: currency || 'INR',
        name: name || 'MaaCare',
        description: description || 'Super Mom Premium Subscription',
        image: 'https://maacare.co/assets/images/logo.png',
        order_id: orderId || '',
        handler: function (response) {
          if (window.razorpaySuccess) {
            window.razorpaySuccess(response.razorpay_payment_id);
          }
        },
        prefill: {
          email: email || '',
          contact: phone || ''
        },
        theme: {
          color: '#E91E8C'
        },
        modal: {
          ondismiss: function () {
            if (window.razorpayDismiss) {
              window.razorpayDismiss();
            }
          }
        }
      };
      var rzp = new Razorpay(options);
      rzp.on('payment.failed', function (response) {
        if (window.razorpayFailed) {
          window.razorpayFailed(response.error.description);
        }
      });
      rzp.open();
    }
  </script>
</body>

</html>
