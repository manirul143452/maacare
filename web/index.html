<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MaaCare – Pregnancy & Motherhood Support App">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="maacare">
  <link rel="apple-touch-icon" href="assets/images/logo.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/logo.png"/>

  <title>MaaCare – You are never alone, Mama 💕</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
  <!-- Razorpay Checkout -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    // Bridge function called from Flutter via dart:js
    function openRazorpay(keyId, amount, currency, name, description, email, phone, orderId) {
      var options = {
        key: keyId,
        amount: amount,
        currency: currency || 'INR',
        name: name || 'MaaCare',
        description: description || 'Super Mom Premium Subscription',
        image: 'https://maacare.co/assets/images/logo.png',
        order_id: orderId || '',
        handler: function(response) {
          // Send success back to Flutter
          if (window.razorpaySuccess) {
            window.razorpaySuccess(response.razorpay_payment_id);
          }
        },
        prefill: {
          email: email || '',
          contact: phone || ''
        },
        theme: {
          color: '#E91E8C'
        },
        modal: {
          ondismiss: function() {
            if (window.razorpayDismiss) {
              window.razorpayDismiss();
            }
          }
        }
      };
      var rzp = new Razorpay(options);
      rzp.on('payment.failed', function(response) {
        if (window.razorpayFailed) {
          window.razorpayFailed(response.error.description);
        }
      });
      rzp.open();
    }
  </script>
</body>
</html>
