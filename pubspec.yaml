name: maacare
description: MaaCare – Motherhood Support App for expectant and new mothers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Backend – InsForge (using REST API)
  flutter_secure_storage: ^9.2.2

  # Networking
  http: ^1.2.1
  http_parser: 4.0.2

  # Internationalization
  intl: ^0.19.0

  # Local Storage
  shared_preferences: ^2.3.2

  # OAuth PKCE Flow requirements
  url_launcher: ^6.3.0
  crypto: ^3.0.3

  # WebSockets for Realtime
  web_socket_channel: ^3.0.1

  # Notifications
  flutter_local_notifications: ^17.2.2
  onesignal_flutter: ^5.3.0

  # Video Player & WebRTC (100ms)
  video_player: ^2.8.7
  hms_room_kit: ^1.2.0
  permission_handler: ^12.0.1

  # Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.1
  lottie: ^3.1.2
  confetti: ^0.7.0

  # Sharing
  share_plus: ^12.0.1
  fl_chart: ^0.68.0
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.1
  flutter_markdown_plus: ^1.0.1

  # Image Picker
  image_picker: ^1.1.2

  # UUID generator (for client-side IDs)
  uuid: ^4.4.2

  # Icons
  cupertino_icons: ^1.0.8

  # Razorpay (Android/iOS only – guarded with kIsWeb check)
  razorpay_flutter: ^1.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/weeks/
    - assets/data/medical_database/
  #   - assets/animations/

  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700

  # Trigger auto pub get

dependency_overrides:
  lottie: ^3.1.2
  intl: ^0.19.0
