name: Build and Deploy to InsForge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true # Enable caching for faster builds
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Build Web (Release)
        run: |
          flutter build web --release --no-tree-shake-icons --web-renderer canvaskit
          
      - name: Deploy to InsForge
        env:
          # These must be set in GitHub Settings > Secrets and Variables > Actions
          INSFORGE_API_KEY: ${{ secrets.INSFORGE_API_KEY }}
          INSFORGE_PROJECT_ID: "89wh46c8"
        run: |
          # Use official InsForge CLI for deployment
          # The CLI handles zipping and uploading build/web automatically
          npx @insforge/cli deploy --project $INSFORGE_PROJECT_ID --dir build/web --token $INSFORGE_API_KEY
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maacare-web-build
          path: build/web/